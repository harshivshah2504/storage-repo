databases:
  - name: github-drive-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: github-drive
    runtime: python
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: gunicorn "github_drive.webapp:create_app()" --bind "0.0.0.0:$PORT" --workers 1 --threads 8 --timeout 600
    healthCheckPath: /healthz
    envVars:
      - key: GITHUB_DRIVE_SESSION_SECRET
        generateValue: true
      - key: GITHUB_DRIVE_DATABASE_URL
        fromDatabase:
          name: github-drive-db
          property: connectionString
      - key: GITHUB_DRIVE_TOKEN
        sync: false
      - key: GITHUB_DRIVE_REPO
        sync: false
      - key: GITHUB_DRIVE_USER_ID
        sync: false
      - key: GITHUB_DRIVE_ENCRYPT
        sync: false
      - key: GITHUB_DRIVE_ENCRYPTION_KEY
        sync: false
      - key: GITHUB_DRIVE_BASIC_AUTH
        sync: false
      - key: GITHUB_DRIVE_ADMIN_USERS
        sync: false
      - key: GITHUB_OAUTH_CLIENT_ID
        sync: false
      - key: GITHUB_OAUTH_CLIENT_SECRET
        sync: false
      - key: GITHUB_OAUTH_REDIRECT_URI
        sync: false
      - key: GITHUB_DRIVE_ALLOW_SIGNUP
        value: "false"
      - key: GITHUB_DRIVE_DB_MIN_CONNECTIONS
        value: "0"
      - key: GITHUB_DRIVE_DB_MAX_CONNECTIONS
        value: "4"
      - key: GITHUB_DRIVE_MAX_UPLOAD_BYTES
        sync: false
      - key: GITHUB_DRIVE_USER_MAX_UPLOAD_BYTES
        sync: false
      - key: GITHUB_DRIVE_MAX_FILES_PER_UPLOAD
        sync: false
      - key: GITHUB_DRIVE_MAX_ACTIVE_TASKS_PER_USER
        sync: false
